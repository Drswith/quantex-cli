name: Sandbox Tests

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - beta
    paths:
      - '.github/workflows/sandbox-tests.yml'
      - 'bun.lock'
      - 'package.json'
      - 'scripts/lifecycle-smoke.ts'
      - 'scripts/test-container.ts'
      - 'scripts/test-sandbox.ts'
      - 'src/agents/**'
      - 'src/agent-update/**'
      - 'src/commands/**'
      - 'src/config/**'
      - 'src/inspection/**'
      - 'src/package-manager/**'
      - 'src/self/**'
      - 'src/state/**'
      - 'src/testing/**'
      - 'src/utils/**'
      - 'test/agents.test.ts'
      - 'test/testing/**'
      - 'test/utils/install.test.ts'

  schedule:
    - cron: '0 6 * * 2'

env:
  CI: true
  BUN_INSTALL_CACHE_DIR: .bun/install/cache
  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
  QTX_ISOLATION_AGENTS: pi,opencode
  QTX_ISOLATION_COMMAND_TIMEOUT_MS: 600000

permissions:
  contents: read

jobs:
  sandbox-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: |
            .bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts --no-progress

      - name: Run Modal sandbox lifecycle smoke
        run: bun run test:sandbox
