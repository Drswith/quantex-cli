name: CI

on:
  push:
    branches:
      - main
      - beta

  pull_request:
    branches:
      - main
      - beta

  workflow_dispatch:

  schedule:
    - cron: '0 3 * * 1'

env:
  CI: true
  BUN_INSTALL_CACHE_DIR: .bun/install/cache

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/cache@v4
        with:
          path: |
            .bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile --ignore-scripts --no-progress
      - run: bun run memory:check
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/cache@v4
        with:
          path: |
            .bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile --ignore-scripts --no-progress
      - run: bun run build
      - if: runner.os == 'Windows' && github.event_name != 'pull_request'
        run: bun run test -- --pool=threads

      - if: runner.os != 'Windows'
        run: bun run test
