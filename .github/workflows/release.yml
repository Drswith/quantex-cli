name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      target_branch:
        description: Protected branch whose release state should be reconciled
        required: true
        default: main
        type: choice
        options:
          - main
          - beta

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.event.inputs.target_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event.workflow_run.event == 'push'
        && github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Select release branch
        id: branch
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            target_branch="${{ github.event.workflow_run.head_branch }}"
          else
            target_branch="${{ github.event.inputs.target_branch || github.ref_name }}"
          fi

          echo "target_branch=${target_branch}" >> "$GITHUB_OUTPUT"

          if [ "${target_branch}" = "beta" ]; then
            echo "config_file=release-please-config.beta.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "config_file=release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout branch source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.branch.outputs.target_branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Refresh branch and tag state
        run: |
          git fetch --force origin "refs/heads/${{ steps.branch.outputs.target_branch }}:refs/remotes/origin/${{ steps.branch.outputs.target_branch }}" --tags
          git reset --hard "origin/${{ steps.branch.outputs.target_branch }}"

      - name: Resolve release target
        id: release-target
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TARGET_BRANCH: ${{ steps.branch.outputs.target_branch }}
        run: bun run scripts/release-target-resolution.ts

      - name: Print release resolution
        run: |
          echo "mode=${{ steps.release-target.outputs.mode }}"
          echo "target_branch=${{ steps.release-target.outputs.target_branch }}"
          echo "target_sha=${{ steps.release-target.outputs.target_sha }}"
          echo "source_ci_run_id=${{ steps.release-target.outputs.source_ci_run_id }}"
          echo "reason=${{ steps.release-target.outputs.reason }}"

      - name: Create release bot token
        id: release-bot-token
        if: ${{ steps.release-target.outputs.mode != 'skip' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release Please PR
        id: release-pr
        if: ${{ steps.release-target.outputs.mode == 'pr' }}
        uses: googleapis/release-please-action@v4.1.5
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ steps.release-target.outputs.target_branch }}
          config-file: ${{ steps.release-target.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Checkout release commit
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release-target.outputs.target_sha }}

      - name: Release Please GitHub Release
        id: release
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        uses: googleapis/release-please-action@v4.1.5
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ steps.release-target.outputs.target_branch }}
          config-file: ${{ steps.release-target.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      - name: Checkout released source
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile

      - name: Validate project memory
        if: ${{ steps.release.outputs.release_created }}
        run: bun run memory:check

      - name: Lint
        if: ${{ steps.release.outputs.release_created }}
        run: bun run lint

      - name: Format check
        if: ${{ steps.release.outputs.release_created }}
        run: bun run format:check

      - name: Typecheck
        if: ${{ steps.release.outputs.release_created }}
        run: bun run typecheck

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: bun run test

      - name: Build package
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build

      - name: Build binaries
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build:bin

      - name: Generate release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: bun run release:artifacts

      - name: Smoke check current runner release binary
        if: ${{ steps.release.outputs.release_created }}
        run: bun run release:smoke

      - name: Verify managed-install package contents
        if: ${{ steps.release.outputs.release_created }}
        run: bun run package:check

      - name: Publish npm package
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public --ignore-scripts --tag ${{ steps.release-target.outputs.npm_tag }}

      - name: Sync quantex alias package
        if: ${{ steps.release.outputs.release_created }}
        env:
          QUANTEX_SYNC_TOKEN: ${{ secrets.QUANTEX_SYNC_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '${RELEASE_TAG}' did not resolve to a semver version without a leading v." >&2
            exit 1
          fi

          npm_tag="latest"
          if [[ "${version}" == *-* ]]; then
            npm_tag="next"
          fi

          curl --fail-with-body -X POST \
            -H "Authorization: Bearer ${QUANTEX_SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Drswith/quantex/dispatches \
            -d "{\"event_type\":\"sync-quantex-cli-release\",\"client_payload\":{\"version\":\"${version}\",\"npm_tag\":\"${npm_tag}\"}}"

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} dist/bin/* --clobber
