name: Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Select release channel
        id: channel
        run: |
          if [ "${GITHUB_REF_NAME}" = "beta" ]; then
            echo "config_file=release-please-config.beta.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "config_file=release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect release relevance
        id: release-scope
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          run_release=false
          is_release_commit=false
          message="$HEAD_COMMIT_MESSAGE"
          first_line="${message%%$'\n'*}"

          if [[ "$first_line" =~ ^chore:\ release ]]; then
            is_release_commit=true
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            run_release=true
          else
            if [[ "$first_line" =~ ^(feat|fix|perf)(\(.+\))?!?: ]]; then
              run_release=true
            elif [[ "$first_line" =~ ^[a-z]+(\(.+\))?!: ]]; then
              run_release=true
            elif [[ "$first_line" =~ ^chore:\ release ]]; then
              run_release=true
            elif grep -q '^BREAKING CHANGE:' <<< "$message"; then
              run_release=true
            fi
          fi

          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"
          echo "is_release_commit=$is_release_commit" >> "$GITHUB_OUTPUT"

      - name: Create release bot token
        id: release-bot-token
        if: ${{ steps.release-scope.outputs.run_release == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release Please PR
        id: release-pr
        if: ${{ steps.release-scope.outputs.run_release == 'true' && steps.release-scope.outputs.is_release_commit != 'true' }}
        uses: googleapis/release-please-action@v4.1.5
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ steps.channel.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Release Please GitHub Release
        id: release
        if: ${{ steps.release-scope.outputs.is_release_commit == 'true' }}
        uses: googleapis/release-please-action@v4.1.5
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ steps.channel.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      - name: Checkout released source
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup Bun
        if: ${{ steps.release.outputs.release_created }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile

      - name: Validate project memory
        if: ${{ steps.release.outputs.release_created }}
        run: bun run memory:check

      - name: Lint
        if: ${{ steps.release.outputs.release_created }}
        run: bun run lint

      - name: Format check
        if: ${{ steps.release.outputs.release_created }}
        run: bun run format:check

      - name: Typecheck
        if: ${{ steps.release.outputs.release_created }}
        run: bun run typecheck

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: bun run test

      - name: Build package
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build

      - name: Build binaries
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build:bin

      - name: Generate release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: bun run release:artifacts

      - name: Smoke check current runner release binary
        if: ${{ steps.release.outputs.release_created }}
        run: bun run release:smoke

      - name: Publish npm package
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public --ignore-scripts --tag ${{ steps.channel.outputs.npm_tag }}

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} dist/bin/* --clobber
