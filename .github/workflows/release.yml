name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      target_branch:
        description: Protected branch whose release state should be reconciled
        required: true
        default: main
        type: choice
        options:
          - main
          - beta

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.event.inputs.target_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event.workflow_run.event == 'push'
        && github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Select release branch
        id: branch
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            target_branch="${{ github.event.workflow_run.head_branch }}"
          else
            target_branch="${{ github.event.inputs.target_branch || github.ref_name }}"
          fi

          echo "target_branch=${target_branch}" >> "$GITHUB_OUTPUT"

          if [ "${target_branch}" = "beta" ]; then
            echo "config_file=release-please-config.beta.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "config_file=release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout branch source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.branch.outputs.target_branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Refresh branch and tag state
        run: |
          git fetch --force origin "refs/heads/${{ steps.branch.outputs.target_branch }}:refs/remotes/origin/${{ steps.branch.outputs.target_branch }}" --tags
          git reset --hard "origin/${{ steps.branch.outputs.target_branch }}"

      - name: Resolve release target
        id: release-target
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TARGET_BRANCH: ${{ steps.branch.outputs.target_branch }}
        run: bun run scripts/release-target-resolution.ts

      - name: Print release resolution
        run: |
          echo "mode=${{ steps.release-target.outputs.mode }}"
          echo "target_branch=${{ steps.release-target.outputs.target_branch }}"
          echo "target_sha=${{ steps.release-target.outputs.target_sha }}"
          echo "target_tag=${{ steps.release-target.outputs.target_tag }}"
          echo "source_ci_run_id=${{ steps.release-target.outputs.source_ci_run_id }}"
          echo "core_required=${{ steps.release-target.outputs.core_required }}"
          echo "npm_integrity=${{ steps.release-target.outputs.npm_integrity }}"
          echo "reason=${{ steps.release-target.outputs.reason }}"

      - name: Create release bot token
        id: release-bot-token
        if: ${{ steps.release-target.outputs.mode != 'skip' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release Please PR
        id: release-pr
        if: ${{ steps.release-target.outputs.mode == 'pr' }}
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ steps.release-target.outputs.target_branch }}
          config-file: ${{ steps.release-target.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Checkout release commit
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.release-target.outputs.target_sha }}

      - name: Setup Node.js
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate Core npm publishing bootstrap
        if: >-
          steps.release-target.outputs.mode == 'publish'
          && steps.release-target.outputs.core_required == 'true'
        env:
          CORE_NPM_TRUSTED_PUBLISHING_READY: ${{ vars.CORE_NPM_TRUSTED_PUBLISHING_READY }}
        shell: bash
        run: |
          set -euo pipefail

          release_version="$(node -p "require('./packages/core/package.json').version")"
          core_package_exists=false
          registry_error_file="$(mktemp)"

          if inspection="$(npm view "@quantex/core" name --json 2>"${registry_error_file}")"; then
            rm -f "${registry_error_file}"
            inspected_name="$(printf '%s' "${inspection}" | tr -d '[:space:]\"')"
            if [ "${inspected_name}" != "@quantex/core" ]; then
              echo "::error title=npm package identity is indeterminate::Expected @quantex/core, but the registry returned ${inspected_name:-no-name}. No GitHub Release or repository package will be published."
              exit 1
            fi
            core_package_exists=true
          else
            registry_error="$(<"${registry_error_file}")"
            rm -f "${registry_error_file}"
            if ! printf '%s' "${registry_error}" | grep -Eq 'E404|404 Not Found'; then
              compact_error="$(printf '%s' "${registry_error}" | tr '\n' ' ')"
              echo "::error title=npm package identity is indeterminate::Unable to determine whether @quantex/core exists. ${compact_error} No GitHub Release or repository package will be published."
              exit 1
            fi
          fi

          if [ "${CORE_NPM_TRUSTED_PUBLISHING_READY:-}" = "true" ]; then
            if [ "${core_package_exists}" = "true" ]; then
              exit 0
            fi

            echo "::error title=Core npm package needs a one-time bootstrap::npm requires a package to exist before a trusted publisher can be configured. Publish the already validated @quantex/core@${release_version} tarball once with an authorized maintainer account and 2FA, then configure the release.yml GitHub Actions trusted publisher, set CORE_NPM_TRUSTED_PUBLISHING_READY=true, and rerun this workflow. No GitHub Release or repository package was published by this run."
            exit 1
          fi

          echo "::error title=Core npm publishing is not bootstrapped::Confirm ownership of the @quantex scope. If @quantex/core does not exist, publish the validated package once with an authorized maintainer account and 2FA. Then configure its GitHub Actions trusted publisher for Drswith/quantex-cli and release.yml with npm publish permission, and set CORE_NPM_TRUSTED_PUBLISHING_READY=true. No GitHub Release or repository package was published by this run."
          exit 1

      - name: Release Please GitHub Release
        id: release
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ steps.release-target.outputs.target_branch }}
          config-file: ${{ steps.release-target.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      - name: Checkout released source
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.release-target.outputs.target_sha }}

      - name: Install dependencies
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun install --frozen-lockfile

      - name: Validate project memory
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run memory:check

      - name: Lint
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run lint

      - name: Format check
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run format:check

      - name: Typecheck
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run typecheck

      - name: Test
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run test

      - name: Build package
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run build

      - name: Build binaries
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run build:bin

      - name: Generate release artifacts
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run release:artifacts

      - name: Smoke check current runner release binary
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run release:smoke

      - name: Verify managed-install package contents
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        run: bun run package:check

      - name: Resolve npm package publication state
        id: npm-publication
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        shell: bash
        run: |
          set -euo pipefail

          release_version="$(node -p "require('./package.json').version")"
          core_required="${{ steps.release-target.outputs.core_required }}"
          if [ "${core_required}" = "true" ]; then
            core_version="$(node -p "require('./packages/core/package.json').version")"
            if [ "${release_version}" != "${core_version}" ]; then
              echo "::error title=Release package versions differ::quantex-cli is ${release_version}, but @quantex/core is ${core_version}. Regenerate the Release PR before publishing."
              exit 1
            fi
          fi

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

          inspect_package() {
            package_name="$1"
            output_name="$2"
            inspection=''
            registry_error_file="$(mktemp)"

            if inspection="$(npm view "${package_name}@${release_version}" version --json 2>"${registry_error_file}")"; then
              rm -f "${registry_error_file}"
              inspected_version="$(printf '%s' "${inspection}" | tr -d '[:space:]\"')"
              if [ "${inspected_version}" != "${release_version}" ]; then
                echo "::error title=npm registry inspection is indeterminate::Expected ${package_name}@${release_version}, but the exact-version lookup returned ${inspected_version:-no-version}. No package will be published."
                exit 1
              fi

              echo "${output_name}_published=true" >> "$GITHUB_OUTPUT"
              echo "${package_name}@${release_version} is already published; publication will be skipped."
              return
            fi

            registry_error="$(<"${registry_error_file}")"
            rm -f "${registry_error_file}"

            if printf '%s' "${registry_error}" | grep -Eq 'E404|404 Not Found'; then
              echo "${output_name}_published=false" >> "$GITHUB_OUTPUT"
              echo "${package_name}@${release_version} is not published yet."
              return
            fi

            compact_error="$(printf '%s' "${registry_error}" | tr '\n' ' ')"
            echo "::error title=npm registry inspection is indeterminate::Unable to determine whether ${package_name}@${release_version} exists. ${compact_error} No package will be published."
            exit 1
          }

          inspect_package_identity() {
            package_name="$1"
            output_name="$2"
            inspection=''
            registry_error_file="$(mktemp)"

            if inspection="$(npm view "${package_name}" name --json 2>"${registry_error_file}")"; then
              rm -f "${registry_error_file}"
              inspected_name="$(printf '%s' "${inspection}" | tr -d '[:space:]\"')"
              if [ "${inspected_name}" != "${package_name}" ]; then
                echo "::error title=npm package identity is indeterminate::Expected ${package_name}, but the registry returned ${inspected_name:-no-name}. No package will be published."
                exit 1
              fi

              echo "${output_name}_package_exists=true" >> "$GITHUB_OUTPUT"
              return
            fi

            registry_error="$(<"${registry_error_file}")"
            rm -f "${registry_error_file}"
            if printf '%s' "${registry_error}" | grep -Eq 'E404|404 Not Found'; then
              echo "${output_name}_package_exists=false" >> "$GITHUB_OUTPUT"
              return
            fi

            compact_error="$(printf '%s' "${registry_error}" | tr '\n' ' ')"
            echo "::error title=npm package identity is indeterminate::Unable to determine whether ${package_name} exists. ${compact_error} No package will be published."
            exit 1
          }

          if [ "${core_required}" = "true" ]; then
            inspect_package "@quantex/core" "core"
            inspect_package_identity "@quantex/core" "core"
          else
            echo "core_published=not-applicable" >> "$GITHUB_OUTPUT"
            echo "core_package_exists=not-applicable" >> "$GITHUB_OUTPUT"
          fi
          inspect_package "quantex-cli" "cli"

      - name: Publish Core npm package
        if: >-
          steps.release-target.outputs.mode == 'publish'
          && steps.release-target.outputs.core_required == 'true'
          && steps.npm-publication.outputs.core_published != 'true'
        run: npm publish ./packages/core --access public --ignore-scripts --tag ${{ steps.release-target.outputs.npm_tag }}

      - name: Verify Core npm package
        if: >-
          steps.release-target.outputs.mode == 'publish'
          && steps.release-target.outputs.core_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          release_version="${{ steps.npm-publication.outputs.release_version }}"

          verify_package_version() {
            package_name="$1"

            for attempt in $(seq 1 12); do
              inspection=''
              if inspection="$(npm view "${package_name}@${release_version}" version --json 2>/dev/null)"; then
                inspected_version="$(printf '%s' "${inspection}" | tr -d '[:space:]\"')"
                if [ "${inspected_version}" = "${release_version}" ]; then
                  echo "Verified ${package_name}@${release_version} on npm."
                  return
                fi
              fi

              if [ "${attempt}" -lt 12 ]; then
                sleep 5
              fi
            done

            echo "::error title=Core npm verification failed::Could not verify ${package_name}@${release_version} after publication. quantex-cli was not published by this run."
            exit 1
          }

          verify_package_version "@quantex/core"

      - name: Publish CLI npm package
        if: >-
          steps.release-target.outputs.mode == 'publish'
          && steps.npm-publication.outputs.cli_published != 'true'
        run: npm publish . --access public --ignore-scripts --tag ${{ steps.release-target.outputs.npm_tag }}

      - name: Verify repository npm closure
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        shell: bash
        run: |
          set -euo pipefail

          release_version="${{ steps.npm-publication.outputs.release_version }}"

          verify_package_version() {
            package_name="$1"

            for attempt in $(seq 1 12); do
              inspection=''
              if inspection="$(npm view "${package_name}@${release_version}" version --json 2>/dev/null)"; then
                inspected_version="$(printf '%s' "${inspection}" | tr -d '[:space:]\"')"
                if [ "${inspected_version}" = "${release_version}" ]; then
                  echo "Verified ${package_name}@${release_version} on npm."
                  return
                fi
              fi

              if [ "${attempt}" -lt 12 ]; then
                sleep 5
              fi
            done

            echo "::error title=Repository npm closure failed::Could not verify ${package_name}@${release_version}. Standalone artifacts will not be uploaded."
            exit 1
          }

          if [ "${{ steps.release-target.outputs.core_required }}" = "true" ]; then
            verify_package_version "@quantex/core"
          fi
          verify_package_version "quantex-cli"

      - name: Upload release artifacts
        if: ${{ steps.release-target.outputs.mode == 'publish' }}
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token }}
        run: gh release upload ${{ steps.release-target.outputs.target_tag }} dist/bin/* --clobber
