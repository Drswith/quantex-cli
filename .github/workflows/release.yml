name: Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Select release channel
        id: channel
        run: |
          if [ "${GITHUB_REF_NAME}" = "beta" ]; then
            echo "config_file=release-please-config.beta.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "config_file=release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release bot token
        id: release-bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ steps.channel.outputs.config_file }}
          manifest-file: .release-please-manifest.json

      - name: Checkout released source
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup Bun
        if: ${{ steps.release.outputs.release_created }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile

      - name: Validate project memory
        if: ${{ steps.release.outputs.release_created }}
        run: bun run memory:check

      - name: Lint
        if: ${{ steps.release.outputs.release_created }}
        run: bun run lint

      - name: Typecheck
        if: ${{ steps.release.outputs.release_created }}
        run: bun run typecheck

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: bun run test

      - name: Build package
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build

      - name: Build binaries
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build:bin

      - name: Generate release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: bun run release:artifacts

      - name: Smoke check current runner release binary
        if: ${{ steps.release.outputs.release_created }}
        run: bun run release:smoke

      - name: Publish npm package
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public --ignore-scripts --tag ${{ steps.channel.outputs.npm_tag }}

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} dist/bin/* --clobber
