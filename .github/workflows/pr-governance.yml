name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-body:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || ''
            const requiredHeadings = [
              '## Summary',
              '## Linked Artifacts',
              '## Validation',
              '## Release Intent',
              '## Docs Updated',
              '## Scope Check',
              '## Closure Check',
            ]

            const missingHeadings = requiredHeadings.filter(heading => !body.includes(heading))
            if (missingHeadings.length > 0) {
              core.setFailed(`PR body is missing required sections: ${missingHeadings.join(', ')}`)
              return
            }

            const linkedArtifactsMatch = body.match(/## Linked Artifacts\s*([\s\S]*?)\n## /)
              ?? body.match(/## Linked Artifacts\s*([\s\S]*)$/)

            if (!linkedArtifactsMatch) {
              core.setFailed('Could not parse the "Linked Artifacts" section in the PR body.')
              return
            }

            const artifactLines = linkedArtifactsMatch[1]
              .split('\n')
              .map(line => line.trim())
              .filter(line => line.startsWith('- '))

            const linkedArtifacts = artifactLines
              .map(line => {
                const separatorIndex = line.indexOf(':')
                if (separatorIndex === -1)
                  return ''
                return line.slice(separatorIndex + 1).trim()
              })
              .filter(Boolean)

            const meaningfulArtifacts = linkedArtifacts.filter(value => {
              const normalized = value.toLowerCase()
              return normalized !== 'n/a'
                && normalized !== 'none'
                && normalized !== 'not applicable'
                && normalized !== 'tbd'
                && normalized !== '(none)'
            })

            if (meaningfulArtifacts.length === 0) {
              core.setFailed('PR body must link at least one issue, ADR, OpenSpec artifact, or discussion in the "Linked Artifacts" section.')
            }

      - name: Validate release trigger scope
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request
            const title = pullRequest.title || ''
            const body = pullRequest.body || ''

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              per_page: 100,
            })

            const changedFiles = files.map(file => file.filename)
            const releaseProcessOnly = changedFiles.length > 0
              && changedFiles.every(fileName => {
                return fileName.startsWith('.github/')
                  || fileName.startsWith('docs/')
                  || fileName.startsWith('openspec/')
                  || fileName === 'release-please-config.json'
                  || fileName === 'release-please-config.beta.json'
                  || fileName === '.release-please-manifest.json'
              })

            if (!releaseProcessOnly)
              return

            const releaseWorthyTitle = /^(feat|fix|perf)(\(.+\))?!?:/.test(title)
              || /^[a-z]+(\(.+\))?!:/.test(title)
            const releaseWorthyBody = /\nBREAKING CHANGE:/.test(`\n${body}`)

            if (releaseWorthyTitle || releaseWorthyBody) {
              core.setFailed([
                'Release/process/docs/memory-only PRs must not use release-worthy conventional commit metadata.',
                'Use ci:, chore:, or docs: unless the PR changes user-facing product behavior.',
                `Changed files: ${changedFiles.join(', ')}`,
              ].join('\n'))
            }

      - name: Validate product release intent
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request
            const title = pullRequest.title || ''
            const body = pullRequest.body || ''
            const headBranch = pullRequest.head.ref || ''

            if (headBranch.startsWith('release-please--branches--'))
              return

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              per_page: 100,
            })

            const changedFiles = files.map(file => file.filename)
            const productImpactingFiles = changedFiles.filter(fileName => {
              return fileName.startsWith('src/')
                || fileName.startsWith('skills/quantex-cli/')
                || fileName.startsWith('scripts/')
                || fileName === 'package.json'
                || fileName === 'bun.lock'
                || fileName === 'install.sh'
                || fileName === 'install.ps1'
                || fileName === 'tsdown.config.ts'
            })

            if (productImpactingFiles.length === 0)
              return

            const releaseWorthyTitle = /^(feat|fix|perf)(\(.+\))?!?:/.test(title)
              || /^[a-z]+(\(.+\))?!:/.test(title)
            const releaseWorthyBody = /\nBREAKING CHANGE:/.test(`\n${body}`)

            if (releaseWorthyTitle || releaseWorthyBody)
              return

            const releaseIntentMatch = body.match(/## Release Intent\s*([\s\S]*?)\n## /)
              ?? body.match(/## Release Intent\s*([\s\S]*)$/)
            const releaseIntent = releaseIntentMatch ? releaseIntentMatch[1].trim() : ''

            const notApplicableMatch = releaseIntent.match(/release\s*:\s*not applicable\s*[-:]\s*(.+)/i)
            const reason = notApplicableMatch ? notApplicableMatch[1].trim() : ''
            const normalizedReason = reason.toLowerCase()
            const placeholderReasons = new Set([
              '',
              'n/a',
              'none',
              'not applicable',
              'tbd',
              '(none)',
            ])

            if (notApplicableMatch && !placeholderReasons.has(normalizedReason))
              return

            core.setFailed([
              'Product-impacting PRs must not silently skip release automation.',
              'Use a release-worthy PR title such as feat:, fix:, perf:, or type!: when the change should release.',
              'If no release is needed, add a meaningful line under "## Release Intent":',
              'Release: not applicable - <reason>',
              `Product-impacting files: ${productImpactingFiles.join(', ')}`,
            ].join('\n'))
