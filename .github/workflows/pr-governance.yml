name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-body:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: List changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })

            core.setOutput('changed_files', JSON.stringify(files.map(file => file.filename)))

      - name: Classify pull request scope
        id: classify
        env:
          CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.changed_files }}
        run: bun run scripts/path-taxonomy.ts

      - name: Merge PR body for governance check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bun run scripts/merge-pr-body-for-governance.ts merged-pr-body.md

      - name: Validate PR body
        env:
          CHANGED_FILES_JSON: ${{ steps.classify.outputs.changed_files }}
          PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          export PR_BODY="$(cat merged-pr-body.md)"
          bun run pr:body:check
