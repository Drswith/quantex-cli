name: Verify Release Build

env:
  N_MINUS_ONE_COMMIT: e17b84e11583f77f810ad3052d8919484dc9f909
  N_MINUS_ONE_SOURCE_DIR: .tmp/releases/quantex-cli-v1.1.3

on:
  push:
    branches:
      - codex/simplify-core-sdk-integration

  workflow_dispatch:

jobs:
  verify-release-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout pinned N-1 release
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          path: ${{ env.N_MINUS_ONE_SOURCE_DIR }}
          persist-credentials: false
          ref: ${{ env.N_MINUS_ONE_COMMIT }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build package
        run: bun run build

      - name: Build pinned N-1 release from the shared dependency install
        run: |
          ln -s "$GITHUB_WORKSPACE/node_modules" "$GITHUB_WORKSPACE/$N_MINUS_ONE_SOURCE_DIR/node_modules"
          bun run --cwd "$N_MINUS_ONE_SOURCE_DIR" build

      - name: Verify offline N/N-1 state and idempotency compatibility
        run: >-
          bun run compat:n-minus-one --
          --previous-cli "$N_MINUS_ONE_SOURCE_DIR/dist/cli.mjs"
          --candidate-cli dist/cli.mjs

      - name: Build binaries
        run: bun run build:bin

      - name: Generate release artifacts
        run: bun run release:artifacts

      - name: Smoke check current runner release binary
        run: bun run release:smoke

      - name: Verify managed-install package contents
        run: bun run package:check

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quantex-release-build
          path: |
            dist/**
            install.sh
            install.ps1
