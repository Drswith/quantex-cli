name: Release PR Automerge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-enable:
    if: >-
      startsWith(github.event.pull_request.head.ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository validation logic
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate Release PR scope
        uses: actions/github-script@v7
        with:
          script: |
            const { validateReleasePrPolicy } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/release-pr-policy.js`)
            const pullRequest = context.payload.pull_request
            const baseBranch = pullRequest.base.ref
            const headBranch = pullRequest.head.ref
            const title = pullRequest.title || ''
            const body = pullRequest.body || ''

            if (pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('Release PR automerge only supports release-please branches from this repository.')
              return
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              per_page: 100,
            })

            const packageJson = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'package.json',
              ref: baseBranch,
            })

            const basePackageJson = JSON.parse(Buffer.from(packageJson.data.content, 'base64').toString('utf8'))
            const issues = validateReleasePrPolicy({
              baseBranch,
              baseVersion: basePackageJson.version,
              body,
              changedFiles: files.map(file => file.filename),
              headBranch,
              title,
            })

            if (issues.length > 0) {
              core.setFailed(issues.join('\n'))
            }

      - name: Create release bot token
        id: release-bot-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Enable Release PR auto-merge
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr merge "$PR_URL" \
            --squash \
            --auto \
            --delete-branch \
            --subject "$PR_TITLE" \
            --body "Automated release-please Release PR merge after scoped validation."
