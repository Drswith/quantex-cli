name: Release PR Automerge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-enable:
    if: >-
      startsWith(github.event.pull_request.head.ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository validation logic
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          # Use the base ref, not the PR head: pull_request_target runs with elevated
          # permissions; importing policy from head.sha would let the PR author replace
          # validateReleasePrPolicy and bypass scope checks before auto-merge.
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate Release PR scope
        id: validate-release-pr
        uses: actions/github-script@v9
        with:
          script: |
            const { validateReleasePrPolicy } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/release-pr-policy.js`)
            const pullRequest = context.payload.pull_request
            const baseBranch = pullRequest.base.ref
            const headBranch = pullRequest.head.ref
            const title = pullRequest.title || ''
            const body = pullRequest.body || ''

            const readJsonFile = async (path, ref) => {
              const response = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref,
              })

              if (Array.isArray(response.data) || !('content' in response.data)) {
                throw new Error(`Expected ${path} at ${ref} to be a file.`)
              }

              return JSON.parse(Buffer.from(response.data.content, 'base64').toString('utf8'))
            }

            if (pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('Release PR automerge only supports release-please branches from this repository.')
              return
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              per_page: 100,
            })

            const [basePackageJson, headPackageJson, headCorePackageJson] = await Promise.all([
              readJsonFile('package.json', pullRequest.base.sha),
              readJsonFile('package.json', pullRequest.head.sha),
              readJsonFile('packages/core/package.json', pullRequest.head.sha),
            ])

            const issues = validateReleasePrPolicy({
              baseBranch,
              baseVersion: basePackageJson.version,
              body,
              changedFiles: files.map(file => file.filename),
              coreManifest: headCorePackageJson,
              headBranch,
              rootManifest: headPackageJson,
              title,
            })

            if (issues.length > 0) {
              core.setFailed(issues.join('\n'))
              return
            }

            const manualMergeRequired =
              baseBranch === 'main' &&
              basePackageJson.version === '0.29.1' &&
              title === 'chore: release 1.1.0'
            core.setOutput('manual_merge_required', manualMergeRequired ? 'true' : 'false')

      - name: Create release bot token
        if: steps.validate-release-pr.outputs.manual_merge_required != 'true'
        id: release-bot-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Enable Release PR auto-merge
        if: steps.validate-release-pr.outputs.manual_merge_required != 'true'
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr merge "$PR_URL" \
            --squash \
            --auto \
            --delete-branch \
            --subject "$PR_TITLE" \
            --body "Automated release-please Release PR merge after scoped validation."
